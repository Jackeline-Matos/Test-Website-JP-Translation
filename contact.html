<!DOCTYPE html>
<html lang="de">
<head>
 
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Serviços profissionais de tradução, coaching de idiomas e comunicação intersetorial. Tradutores especialistas para o seu sucesso global com a JP Translations.">
  <meta name="description" content="Ihr zuverlässiger Partner für professionelle Übersetzungsdienstleistungen und Coaching.">
  <meta name="keywords" content="professionelle Übersetzung, Übersetzer Deutsch-Portugiesisch, Sprachcoaching, interkulturelle Kommunikation, JP Translations">

  <meta property="og:title" content="JP Translations | Tradução e Coaching">

  <title> JP Translations | Contact </title>
  <link rel="icon" type="image/x-icon" href="css/foto/Schmetterling.svg">

  <link rel="canonical" href="https://seusite.com">
  <link rel="stylesheet" href="css/global.css">
 

</head>
<body id="contact-page">
  <div id="header-placeholder"></div>

  <main class=" main-contact">
    <section class="contact-intro">
      <h1>Kontaktieren Sie uns</h1>
      <p>Haben Sie Fragen oder benötigen Sie ein Angebot? Wir sind für Sie da.</p>
    </section>

    <div class="contact-flex">
      <form class="contact-form">
        <div class="form-group">
          <label for="name">Name *</label>
          <input type="text" id="name" required placeholder="Ihr Name">
        </div>
        
        <div class="form-group">
          <label for="email">E-Mail *</label>
          <input type="email" id="email" required placeholder="ihre@email.com">
        </div>

        <div class="form-group">
          <label for="service">Dienstleistung</label>
          <select id="service">
            <option value="translation">Übersetzung</option>
            <option value="coaching">Sprachkurs / Coaching</option>
            <option value="relocation">Relocation Support</option>
            <option value="other">Sonstiges</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Nachricht *</label>
          <textarea id="message" rows="5" required placeholder="Wie können wir helfen?"></textarea>
        </div>

        <button type="submit" class="btn-contact-outline btn-contact"  >Nachricht senden</button>
      </form>

      <div class="kontact-info">
        <h3>Kontaktinformationen</h3>
        <p><strong>E-Mail:</strong> info@jptranslations.com</p>
        <p><strong>Telefon:</strong> +49 (0) 176 123 456 78</p>
        <p><strong>Standort:</strong> Deutschland / Global</p>
        <p><strong>Ansprechpartnerin:</strong>Jana Paul-Wustlich</p>
        
        <div class="social-links"</div>
      </div>
    </div>
  </main>


  <div id="footer-placeholder"></div>
  <div id="datenschutz-placeholder"></div>
  
<script src="js/script.js" defer></script>
</body>
